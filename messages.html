<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | SponsorBridge</title>

    <link rel="stylesheet" href="css/messages.css">
</head>
<body>

    <div class="chat-container">

        <div class="sidebar">

            <h2>Messages</h2>

            <div class="chat-user active">
                <h3>TechStore</h3>
                <p>Interested in sponsoring...</p>
            </div>

            <div class="chat-user">
                <h3>Future Labs</h3>
                <p>Hello! We'd like to...</p>
            </div>

            <div class="chat-user">
                <h3>ABC Coaching</h3>
                <p>Can we discuss...</p>
            </div>

        </div>

        <div class="chat-area">

            <div class="chat-header">
                <h2>TechStore</h2>
            </div>

            <div class="messages">

                <div class="message received">
                    Hello! We're interested in sponsoring your event.
                </div>

                <div class="message sent">
                    Thanks! We'd love to discuss further.
                </div>

                <div class="message received">
                    What's your expected budget?
                </div>

            </div>

            <div class="message-input">

                <input
                    type="text"
                    placeholder="Type a message..."
                >

                <button>Send</button>

            </div>

        </div>

    </div>

</body>
</html>
